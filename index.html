<style>
/* === Original Styles === */

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;color:#1e293b;background:#f1f5f9;line-height:1.85;font-size:16px}
.cover{background:linear-gradient(135deg,#0c4a6e 0%,#164e63 40%,#1e3a5f 100%);color:#fff;padding:70px 50px;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:50vh}
.cover-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:8px 22px;font-size:.85em;margin-bottom:30px;letter-spacing:3px}
.cover h1{font-size:2.5em;font-weight:800;letter-spacing:1px;margin-bottom:15px;line-height:1.3}
.cover .subtitle{font-size:1.35em;color:#a5f3fc;margin-bottom:25px;font-weight:300}
.cover .meta{font-size:.88em;color:#94a3b8;line-height:2.2}
.cover-stats{display:flex;gap:18px;margin-top:35px;flex-wrap:wrap;justify-content:center}
.cover-stat{background:rgba(255,255,255,.12);border-radius:14px;padding:18px 26px;text-align:center;min-width:135px}
.cover-stat .num{font-size:2.2em;font-weight:800;color:#22d3ee}
.cover-stat .label{font-size:.82em;color:#cbd5e1;margin-top:4px}
.nav{background:#0f172a;padding:12px 30px;position:sticky;top:0;z-index:100;display:flex;gap:6px;overflow-x:auto;border-bottom:2px solid #22d3ee}
.nav a{color:#e2e8f0;text-decoration:none;font-size:.82em;padding:5px 14px;border-radius:8px;white-space:nowrap;transition:all .2s}
.nav a:hover{background:#22d3ee;color:#0f172a}
.wrap{max-width:900px;margin:0 auto;padding:40px 28px}
.ch{margin-bottom:55px}
.ch-num{font-size:.72em;color:#22d3ee;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.ch-title{font-size:1.75em;color:#0c4a6e;border-bottom:3px solid #22d3ee;padding-bottom:12px;margin-bottom:22px;font-weight:700}
.sec-title{font-size:1.2em;color:#164e63;margin:28px 0 14px;font-weight:600;border-left:4px solid #22d3ee;padding-left:12px}
.subsec-title{font-size:1.05em;color:#1e3a5f;margin:18px 0 10px;font-weight:600}
.sec-subtitle{font-size:.95em;color:#0891b2;margin:14px 0 8px;font-weight:600}
p{margin-bottom:14px;text-align:justify}
ul,ol{margin-bottom:14px;padding-left:22px}
li{margin-bottom:7px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin:18px 0}
.sc{background:#fff;border-radius:10px;padding:18px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.sc .num{font-size:1.8em;font-weight:700;color:#0c4a6e}
.sc .label{font-size:.82em;color:#64748b;margin-top:4px}
.sc.hl .num{color:#0891b2}
.case-card{background:#fff;border-radius:12px;padding:22px;margin:18px 0;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #0891b2}
.case-card.fail{border-left-color:#ef4444}
.case-card .case-id{background:#0891b2;color:#fff;padding:2px 10px;border-radius:6px;font-size:.72em;font-weight:600}
.case-card.fail .case-id{background:#ef4444}
.case-card .case-name{font-size:1.05em;font-weight:600;color:#0c4a6e;margin-left:8px}
.case-card .tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.case-card .tag{background:#ecfeff;color:#0c4a6e;padding:2px 8px;border-radius:4px;font-size:.72em}
.case-card .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.case-card .dl{font-size:.78em;color:#64748b;font-weight:600}
.case-card .dv{font-size:.92em;color:#1e293b}
.finding{background:linear-gradient(135deg,#ecfeff,#f0f9ff);border-radius:10px;padding:18px;margin:12px 0}
.finding .fn{background:#0891b2;color:#fff;width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.82em;vertical-align:middle}
.finding .ft{font-size:1em;font-weight:600;color:#0c4a6e;margin:8px 0;display:inline;vertical-align:middle}
.finding .fx{font-size:.92em;color:#334155;margin-top:6px}
.hbox{background:#fef3c7;border-left:4px solid #f59e0b;padding:14px 18px;margin:14px 0;border-radius:0 8px 8px 0;font-size:.9em}
.hbox .ht{font-weight:600;color:#d97706}
.wbox{background:#fee2e2;border-left:4px solid #ef4444;padding:14px 18px;margin:14px 0;border-radius:0 8px 8px 0;font-size:.9em}
.wbox .wt{font-weight:600;color:#dc2626}
table{width:100%;border-collapse:collapse;margin:18px 0;font-size:.88em}
th{background:#0f172a;color:#fff;padding:10px 12px;text-align:left;font-weight:600}
td{padding:8px 12px;border-bottom:1px solid #e2e8f0}
tr:hover{background:#f0f9ff}
.tn{font-weight:700;color:#0c4a6e;text-align:center}
.chart-wrap{background:#fff;border-radius:12px;padding:20px;margin:20px 0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-wrap .chart-title{font-size:.95em;color:#0c4a6e;font-weight:600;margin-bottom:12px;text-align:center}
.toc{background:#fff;border-radius:12px;padding:28px;margin:22px 0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.toc h3{font-size:1.1em;color:#0c4a6e;border-bottom:2px solid #22d3ee;padding-bottom:8px;margin-bottom:14px}
.toc ol{padding-left:20px}
.toc li{margin-bottom:6px;font-size:.92em}
.toc a{color:#0c4a6e;text-decoration:none}
.toc a:hover{color:#0891b2}
.disclaimer{background:#e2e8f0;border-radius:10px;padding:18px;margin:20px 0;font-size:.85em;color:#475569;text-align:center}
.timeline{position:relative;padding:20px 0 20px 40px}
.timeline::before{content:'';position:absolute;left:18px;top:0;bottom:0;width:3px;background:#0891b2}
.tl-item{position:relative;margin-bottom:18px;padding-left:20px}
.tl-item::before{content:'';position:absolute;left:-22px;top:6px;width:14px;height:14px;border-radius:50%;background:#0891b2;border:3px solid #fff}
.tl-item .tl-date{font-size:.78em;color:#0891b2;font-weight:600}
.tl-item .tl-text{font-size:.92em;color:#334155}
.quote{background:#f0f9ff;border-radius:8px;padding:14px 18px;margin:12px 0;font-style:italic;color:#475569;border-left:3px solid #0891b2}
.quote .qsrc{font-size:.82em;color:#94a3b8;margin-top:6px;font-style:normal}
.model-card{background:#fff;border-radius:10px;padding:16px;margin:12px 0;box-shadow:0 1px 4px rgba(0,0,0,.05);border-top:3px solid #0891b2}
.model-card .mc-title{font-size:.95em;font-weight:600;color:#0c4a6e}
.model-card .mc-desc{font-size:.88em;color:#64748b;margin-top:6px}
.model-card .mc-data{font-size:.82em;color:#0891b2;font-weight:600;margin-top:4px}
.industry-section{background:#fff;border-radius:12px;padding:24px;margin:20px 0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.industry-section .ind-name{font-size:1.15em;font-weight:700;color:#0c4a6e;border-bottom:2px solid #0891b2;padding-bottom:8px;margin-bottom:14px}
.industry-section .ind-stat{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.industry-section .ind-stat .is{background:#ecfeff;color:#0c4a6e;padding:4px 10px;border-radius:6px;font-size:.82em;font-weight:600}
.advice-card{background:linear-gradient(135deg,#f0f9ff,#ecfeff);border-radius:12px;padding:18px;margin:12px 0;border:1px solid #0891b2}
.advice-card .ac-role{font-size:.82em;color:#0891b2;font-weight:700;letter-spacing:1px}
.advice-card .ac-title{font-size:1em;font-weight:600;color:#0c4a6e;margin-top:4px}
.advice-card .ac-text{font-size:.92em;color:#334155;margin-top:6px}
footer{text-align:center;padding:30px;font-size:.8em;color:#94a3b8;border-top:2px solid #e2e8f0;margin-top:40px}
@media(max-width:600px){.wrap{padding:20px 16px}.cover h1{font-size:1.6em}.cover-stat{min-width:100px;padding:12px}.case-card .detail-grid{grid-template-columns:1fr}.stat-grid{grid-template-columns:1fr 1fr}}


/* === Mobile Enhancements === */
@media(max-width:768px){
body{font-size:15px}
.cover{padding:45px 18px;min-height:35vh}
.cover h1{font-size:1.5em}
.cover .subtitle{font-size:1.05em}
.cover-stats{gap:8px;margin-top:22px}
.cover-stat{padding:12px 14px;min-width:80px}
.cover-stat .num{font-size:1.5em}
.nav{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 10px;gap:2px}
.nav a{font-size:.68em;padding:4px 7px;flex-shrink:0}
.wrap{padding:24px 14px;max-width:100%}
.ch-title{font-size:1.3em}
.sec-title{font-size:1.05em}
.stat-grid{grid-template-columns:repeat(2,1fr);gap:8px}
.sc{padding:12px 10px}

p{font-size:.92em}

/* === Password Gate === */
body.pw-active{overflow:hidden}
.pw-gate{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0c4a6e,#164e63,#1e3a5f);transition:opacity .6s,visibility .6s}
.pw-gate::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(34,211,238,.12) 0%,transparent 70%)}
.pw-gate.hidden{opacity:0;visibility:hidden;pointer-events:none}
.pw-card{position:relative;z-index:1;background:rgba(255,255,255,.08);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:48px 40px;max-width:420px;width:90%;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);animation:pwFadeUp .6s cubic-bezier(.16,1,.3,1)}
@keyframes pwFadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.pw-icon{margin-bottom:20px;display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;background:rgba(34,211,238,.15);border:1px solid rgba(34,211,238,.25)}
.pw-icon svg{width:26px;height:26px;color:#22d3ee}
.pw-title{font-size:1.2em;font-weight:700;color:#fff;letter-spacing:.5px;margin-bottom:6px}
.pw-subtitle{font-size:.8em;color:#94a3b8;margin-bottom:24px;line-height:1.5}
.pw-input-wrap{position:relative;margin-bottom:16px}
.pw-input{width:100%;padding:13px 16px;padding-right:44px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:.95em;outline:none;transition:all .3s;font-family:inherit}
.pw-input::placeholder{color:rgba(255,255,255,.3)}
.pw-input:focus{border-color:#22d3ee;background:rgba(255,255,255,.1);box-shadow:0 0 0 4px rgba(34,211,238,.1)}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:4px;transition:color .2s}
.pw-toggle:hover{color:#22d3ee}
.pw-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0891b2,#22d3ee);border:none;border-radius:12px;color:#0c4a6e;font-size:.95em;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:.5px;font-family:inherit}
.pw-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 25px rgba(8,145,178,.35)}
.pw-btn:active:not(:disabled){transform:scale(.98)}
.pw-btn:disabled{opacity:.6;cursor:not-allowed}
.pw-error{color:#fca5a5;font-size:.78em;margin-top:10px;opacity:0;transform:translateY(-5px);transition:all .3s}
.pw-error.show{opacity:1;transform:translateY(0)}
.pw-shake{animation:pwShake .5s cubic-bezier(.36,.07,.19,.97)}
@keyframes pwShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.pw-loading{display:none;margin:20px auto 0;text-align:center}
.pw-loading.active{display:block}
.pw-spinner{display:inline-block;width:32px;height:32px;border:3px solid rgba(34,211,238,.2);border-top-color:#22d3ee;border-radius:50%;animation:pwSpin .8s linear infinite}
@keyframes pwSpin{to{transform:rotate(360deg)}}
.pw-loading-text{color:#94a3b8;font-size:.8em;margin-top:10px}
@media(max-width:480px){.pw-card{padding:36px 24px}.pw-title{font-size:1.1em}}
</style>

  var key = await crypto.subtle.deriveKey(
    {name: 'PBKDF2', salt: b64ToBuf(P.salt), iterations: 200000, hash: 'SHA-256'},
    keyMaterial,
    {name: 'AES-GCM', length: 256},
    false,
    ['decrypt']
  );

  var ct = b64ToBuf(P.encrypted);
  var tag = b64ToBuf(P.authTag);
  var combined = new Uint8Array(ct.length + tag.length);
  combined.set(ct);
  combined.set(tag, ct.length);

  return crypto.subtle.decrypt(
    {name: 'AES-GCM', iv: b64ToBuf(P.iv)},
    key,
    combined
  );
}

var gate = document.getElementById('pwGate');
var card = document.getElementById('pwCard');
var input = document.getElementById('pwInput');
var btn = document.getElementById('pwBtn');
var err = document.getElementById('pwError');
var toggle = document.getElementById('pwToggle');
var loading = document.getElementById('pwLoading');
var container = document.getElementById('reportContainer');

function shake() {
  card.classList.remove('pw-shake');
  void card.offsetWidth;
  card.classList.add('pw-shake');
}

function showError(msg) {
  err.textContent = msg || '密码错误，请重试';
  err.classList.add('show');
  shake();
}

function hideError() {
  err.classList.remove('show');
}

function checkCached() {
  try {
    var cached = sessionStorage.getItem('_rpt_decrypted');
    if (cached) {
      container.innerHTML = cached;
      document.body.classList.remove('pw-active');
      gate.classList.add('hidden');
      runCharts();
      return true;
    }
  } catch(e) {}
  return false;
}

async function tryDecrypt(pwd) {
  hideError();
  btn.disabled = true;
  loading.classList.add('active');
  btn.textContent = '解密中...';

  try {
    var plainBuf = await decrypt(pwd.trim());
    var dec = new TextDecoder();
    var html = dec.decode(plainBuf);

    try {
      sessionStorage.setItem('_rpt_decrypted', html);
    } catch(e) {}

    container.innerHTML = html;
    document.body.classList.remove('pw-active');
    gate.classList.add('hidden');
    input.value = '';

    runCharts();

    try {
      localStorage.setItem('_rpt_auth', '1');
    } catch(e) {}

  } catch(e) {
    loading.classList.remove('active');
    btn.textContent = '解密并查看';
    btn.disabled = false;
    if (e.name === 'OperationError') {
      showError('密码错误，请重试');
    } else {
      showError('解密失败：数据可能损坏，请刷新页面重试');
    }
    input.value = '';
    input.focus();
    return;
  }

  loading.classList.remove('active');
  btn.textContent = '解密并查看';
  btn.disabled = false;
}

var visible = false;
toggle.addEventListener('click', function(){
  visible = !visible;
  input.type = visible ? 'text' : 'password';
  toggle.title = visible ? '隐藏密码' : '显示密码';
});

btn.addEventListener('click', function(){ tryDecrypt(input.value); });
input.addEventListener('keydown', function(e){
  if (e.key === 'Enter') { tryDecrypt(input.value); }
  hideError();
});

function checkReturn() {
  try {
    var authed = localStorage.getItem('_rpt_auth');
    if (authed === '1') {
      if (checkCached()) return;
    }
  } catch(e) {}
}
