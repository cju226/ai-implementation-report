<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#1e293b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>企业AI落地案例Tracking</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业AI落地案例Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

:root{
  --ink-950:#eae8e1;
  --ink-900:#f3f1ea;
  --ink-850:#ece9e1;
  --ink-800:#dedad0;
  --ink-750:#d2cdc1;
  --line:#d3cfc4;
  --line-soft:#ddd9cf;
  --text-hi:#2b2823;
  --text-mid:#5c5648;
  --text-low:#8a8270;
  --gold:#92632b;
  --gold-soft:#b8884a;
  --green:#4c7a55;
  --amber:#9c7327;
  --red:#9a4f3f;
  --grey:#83795f;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--ink-950);
  color:var(--text-hi);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.serif{font-family:'Spectral',serif;}

/* ---------- Header ---------- */
header.masthead{
  border-bottom:1px solid var(--line);
  padding:22px 28px 16px;
  background:
    radial-gradient(ellipse 900px 240px at 15% 0%, rgba(146,99,43,0.07), transparent 70%),
    var(--ink-950);
}
.masthead-inner{max-width:1180px;margin:0 auto;}
.masthead-top{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;}
.masthead-eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:8px;
  display:flex;align-items:center;gap:10px;
}
.masthead-eyebrow .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--gold-soft),transparent);min-width:60px;}
h1.title{
  font-family:'Spectral',serif;
  font-weight:600;
  font-size:clamp(22px,3vw,30px);
  margin:0 0 4px;
  letter-spacing:-0.01em;
  color:var(--text-hi);
}
.subtitle{
  color:var(--text-low);
  font-size:12.5px;
  max-width:640px;
  line-height:1.5;
}
.building-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:0.04em;
  margin-left:10px;vertical-align:middle;
  padding:3px 8px 3px 6px;border-radius:20px;
  background:rgba(146,99,43,0.1);color:var(--gold);
  border:1px solid rgba(146,99,43,0.3);
}
.building-badge::before{
  content:'';width:5px;height:5px;border-radius:50%;background:var(--gold);
  animation:pulse-dot 1.8s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.35;}}
.stat-row{display:flex;gap:0;flex-wrap:wrap;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:fit-content;flex-shrink:0;}
.stat{padding:7px 16px;border-right:1px solid var(--line);min-width:78px;}
.stat:last-child{border-right:none;}
.stat .num{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;color:var(--gold);display:block;line-height:1.1;}
.stat .lbl{font-size:10px;color:var(--text-low);margin-top:2px;}
.count-note{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--text-low);
  margin-top:6px;line-height:1.5;max-width:640px;
}
.count-note b{color:var(--text-mid);font-weight:500;}

/* ---------- Filter bar ---------- */
.filterbar{
  position:sticky;top:0;z-index:20;
  background:rgba(243,241,234,0.96);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.filterbar-inner{max-width:1180px;margin:0 auto;padding:10px 28px;}
.filterbar-head{
  display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;
}
.filterbar-head .toggle-btn{
  font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text-mid);
  display:flex;align-items:center;gap:6px;
  border:1px solid var(--line);border-radius:3px;padding:5px 10px;
  background:var(--ink-900);
}
.filterbar-head .toggle-btn .arrow{transition:transform .15s;font-size:9px;}
.filterbar.open .toggle-btn .arrow{transform:rotate(180deg);}
.active-summary{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text-low);flex:1;}
.active-summary .chip-mini{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--ink-800);border:1px solid var(--line);border-radius:2px;
  padding:2px 7px;margin-right:5px;font-size:10.5px;color:var(--text-mid);
}
.active-summary .chip-mini .x{color:var(--red);cursor:pointer;font-weight:700;}
.search-inline{
  background:var(--ink-900);border:1px solid var(--line);border-radius:3px;
  padding:6px 10px;color:var(--text-hi);font-family:'Inter',sans-serif;font-size:12.5px;
  width:200px;
}
.search-inline::placeholder{color:var(--text-low);}
.search-inline:focus{outline:none;border-color:var(--gold-soft);}

.filterbar-body{display:none;padding-top:12px;border-top:1px solid var(--line-soft);margin-top:10px;max-height:min(58vh,460px);overflow-y:auto;}
.filterbar.open .filterbar-body{display:block;}
.filter-group{margin-bottom:9px;display:flex;align-items:flex-start;gap:10px;}
.filter-group:last-child{margin-bottom:0;}
.filter-group-label{
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text-low);padding-top:4px;width:64px;flex-shrink:0;
}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.chip{
  font-family:'IBM Plex Mono',monospace;font-size:11.5px;padding:4px 9px;border-radius:3px;
  border:1px solid var(--line);background:var(--ink-900);color:var(--text-mid);
  cursor:pointer;user-select:none;transition:all .12s ease;white-space:nowrap;
}
.chip:hover{border-color:var(--gold-soft);color:var(--text-hi);}
.chip.active{background:var(--gold);border-color:var(--gold);color:var(--ink-950);font-weight:600;}
.chip .ct{opacity:0.6;margin-left:4px;}
.chip.active .ct{opacity:0.55;}
.chip-roster{border-color:var(--gold-soft);}
.chip-roster.active{background:var(--gold);border-color:var(--gold);}
.chip.conf-green.active{background:var(--green);border-color:var(--green);}
.chip.conf-amber.active{background:var(--amber);border-color:var(--amber);}
.chip.conf-red.active{background:var(--red);border-color:var(--red);}

.toolbar-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;}
.sort-select{
  background:var(--ink-900);border:1px solid var(--line);border-radius:3px;color:var(--text-mid);
  font-family:'IBM Plex Mono',monospace;font-size:11.5px;padding:6px 8px;
}
.btn-reset{
  font-family:'IBM Plex Mono',monospace;font-size:11.5px;background:none;border:1px solid var(--line);
  color:var(--text-mid);padding:6px 12px;border-radius:3px;cursor:pointer;
}
.btn-reset:hover{border-color:var(--red);color:var(--red);}

/* ---------- Results ---------- */
main{max-width:1180px;margin:0 auto;padding:16px 28px 80px;}
.result-meta{
  font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text-low);
  margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;
}
.result-meta .reset-link{color:var(--gold);cursor:pointer;text-decoration:underline;}
.view-toggle{display:flex;gap:6px;}
.view-toggle button{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:var(--ink-900);
  border:1px solid var(--line);color:var(--text-mid);padding:4px 9px;border-radius:3px;cursor:pointer;
}
.view-toggle button.active{background:var(--ink-800);color:var(--gold);border-color:var(--gold-soft);}

.card-list{display:flex;flex-direction:column;gap:10px;}
.case-row{
  background:var(--ink-900);border:1px solid var(--line);border-radius:5px;overflow:hidden;
}
.case-head{
  display:flex;cursor:pointer;
}
.case-head:hover{background:var(--ink-850);}
.case-tab{
  width:54px;flex:0 0 54px;display:flex;align-items:center;justify-content:center;
  border-right:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:11.5px;
  color:var(--text-low);position:relative;
}
.case-tab .seal{width:7px;height:7px;border-radius:50%;position:absolute;top:9px;right:9px;}
.seal-green{background:var(--green);}
.seal-amber{background:var(--amber);}
.seal-red{background:var(--red);}
.seal-grey{background:var(--grey);}

.case-main{flex:1;padding:12px 16px;min-width:0;}
.case-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:5px;}
.case-name{font-family:'Spectral',serif;font-weight:600;font-size:15.5px;color:var(--text-hi);}
.case-tags{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto;}
.tag{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 7px;border-radius:2px;white-space:nowrap;}
.tag-track-biz{background:rgba(76,122,85,0.13);color:var(--green);}
.tag-track-rd{background:rgba(146,99,43,0.14);color:var(--gold);}
.tag-track-mix{background:rgba(154,79,63,0.13);color:var(--red);}
.tag-track-fail{background:rgba(154,79,63,0.22);color:var(--red);font-weight:600;}
.tag-appdir{background:var(--ink-800);color:var(--text-mid);border:1px solid var(--line);}
.tag-industry{background:none;color:var(--text-low);border:1px solid var(--line-soft);}
.tag-source{background:none;color:var(--gold-soft);border:1px dashed var(--gold-soft);}
.case-row.is-failure{border-color:var(--red);border-width:1px;}
.case-row.is-failure .case-tab{border-right-color:var(--red);}
.case-row.is-failure .case-name{color:var(--red);}
.case-row.is-failure .case-tab::before{
  content:'⚠';position:absolute;top:7px;left:6px;font-size:10px;color:var(--red);
}
.case-pain-preview{color:var(--text-mid);font-size:13.5px;line-height:1.6;}
.case-pain-preview b{color:var(--text-low);font-weight:500;font-family:'IBM Plex Mono',monospace;font-size:10.5px;}

.case-detail{
  padding:6px 16px 18px 16px;
  margin-left:54px;
  border-top:1px dashed var(--line);
  font-size:13.5px;line-height:1.8;color:var(--text-mid);
  display:none;
}
.case-row.expanded .case-detail{display:block;}
.chevron{display:inline-block;transition:transform .15s;color:var(--text-low);font-size:9px;position:absolute;bottom:8px;transform:rotate(-90deg);}
.case-row.expanded .chevron{transform:rotate(0deg);}
.case-detail .d-row{margin:11px 0;}
.case-detail .d-label{
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--gold-soft);margin-bottom:3px;
}
.case-detail .d-text{white-space:pre-line;}
.case-detail .insight-text{color:var(--text-mid);font-style:italic;border-left:2px solid var(--line);padding-left:10px;}
.case-detail .conf-text{color:var(--text-mid);}
.case-detail .source-text{color:var(--text-low);font-size:12px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-low);}
.empty-state .em-title{font-family:'Spectral',serif;font-size:18px;color:var(--text-mid);margin-bottom:6px;}

footer{
  text-align:center;color:var(--text-low);font-size:11px;font-family:'IBM Plex Mono',monospace;
  padding:26px 20px 50px;border-top:1px solid var(--line);
}

@media (max-width:640px){
  header.masthead{padding:16px 16px 12px;}
  .filterbar-inner{padding:10px 16px;}
  main{padding:14px 14px 60px;}
  .case-tags{margin-left:0;width:100%;}
  .case-detail{margin-left:0;}
  .stat{padding:6px 10px;min-width:64px;}
  .masthead-top{flex-direction:column;align-items:flex-start;}
}


/* === Mobile Enhancements === */
@media(max-width:768px){
header.masthead{padding:16px 14px 12px}
.masthead-top{gap:14px}
.stat-row{flex-wrap:wrap;width:100%}
.stat{min-width:calc(50% - 1px)}
.filterbar{padding:12px 14px;max-height:60vh;overflow-y:auto}
.filter-section{margin-bottom:14px}
.chip{padding:4px 8px;font-size:10px;margin:2px}
.chip.active{font-weight:600}
.controls{padding:12px 14px;flex-direction:column;gap:8px}
.card-list{padding:0 10px}
.case-row{margin:8px 10px;padding:14px 12px}
.case-head{gap:6px}
.case-meta{font-size:9.5px;flex-wrap:wrap;gap:4px}
.case-body{padding:12px 14px}
.detail-grid{grid-template-columns:1fr}
.d-item{min-width:0}
}

/* === Responsive Table === */
table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%}


/* === PW Gate === */
body.pw-active{overflow:hidden}
.pw-gate{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e293b,#334155,#1e293b);transition:opacity .5s,visibility .5s}
.pw-gate::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(146,99,43,.1) 0%,transparent 70%)}
.pw-gate.hidden{opacity:0;visibility:hidden;pointer-events:none}
.pw-card{position:relative;z-index:1;background:rgba(255,255,255,.06);backdrop-filter:blur(32px) saturate(160%);-webkit-backdrop-filter:blur(32px) saturate(160%);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:44px 36px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);animation:pfUp .5s cubic-bezier(.16,1,.3,1)}
@keyframes pfUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.pw-icon{margin-bottom:16px;display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;background:rgba(146,99,43,.15);border:1px solid rgba(146,99,43,.25)}
.pw-icon svg{width:24px;height:24px;color:#b8884a}
.pw-title{font-size:1.15em;font-weight:700;color:#f3f1ea;letter-spacing:.3px;margin-bottom:4px}
.pw-subtitle{font-size:.78em;color:#8a8270;margin-bottom:22px;line-height:1.5}
.pw-input-wrap{position:relative;margin-bottom:14px}
.pw-input{width:100%;padding:12px 14px;padding-right:42px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;color:#eae8e1;font-size:.92em;outline:none;transition:all .25s;font-family:inherit}
.pw-input::placeholder{color:rgba(255,255,255,.25)}
.pw-input:focus{border-color:#b8884a;background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(146,99,43,.1)}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;padding:4px}
.pw-toggle:hover{color:#b8884a}
.pw-btn{width:100%;padding:12px;background:linear-gradient(135deg,#92632b,#b8884a);border:none;border-radius:10px;color:#fff;font-size:.9em;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.3px;font-family:inherit}
.pw-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(146,99,43,.3)}
.pw-btn:active:not(:disabled){transform:scale(.98)}
.pw-btn:disabled{opacity:.55;cursor:not-allowed}
.pw-error{color:#e5989b;font-size:.75em;margin-top:8px;opacity:0;transform:translateY(-4px);transition:all .25s}
.pw-error.show{opacity:1;transform:translateY(0)}
.pw-shake{animation:sh .45s cubic-bezier(.36,.07,.19,.97)}
@keyframes sh{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.pw-loading{display:none;margin:18px auto 0;text-align:center}
.pw-loading.active{display:block}
.pw-spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(146,99,43,.2);border-top-color:#b8884a;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.pw-loading-text{color:#8a8270;font-size:.75em;margin-top:8px}
@media(max-width:480px){.pw-card{padding:32px 22px}.pw-title{font-size:1.05em}}

</style>
</head>
<body class="pw-active">

<!-- ===== PASSWORD GATE ===== -->
<div class="pw-gate" id="pwGate">
<div class="pw-card" id="pwCard">
<div class="pw-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
</div>
<div class="pw-title">访问验证</div>
<div class="pw-subtitle">案例库内容已加密，需要密码查看</div>
<div class="pw-input-wrap">
<input type="password" class="pw-input" id="pwInput" placeholder="请输入访问密码" autocomplete="off" spellcheck="false">
<button type="button" class="pw-toggle" id="pwToggle" title="显示/隐藏密码">
<svg id="pwEye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
</div>
<button type="button" class="pw-btn" id="pwBtn">解密查看</button>
<div class="pw-error" id="pwError">密码错误，请重试</div>
<div class="pw-loading" id="pwLoading">
<div class="pw-spinner"></div>
<div class="pw-loading-text">解密中...</div>
</div>
</div>
</div>

<script>
(function(){
'use strict';
var P = window.__EP__;
function b64ToBuf(b64) {
  var bin = atob(b64);
  var buf = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}
async function decrypt(pwd) {
  var enc = new TextEncoder();
  var km = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
  var key = await crypto.subtle.deriveKey(
    {name: 'PBKDF2', salt: b64ToBuf(P.salt), iterations: 200000, hash: 'SHA-256'},
    km, {name: 'AES-GCM', length: 256}, false, ['decrypt']
  );
  var ct = b64ToBuf(P.encrypted);
  var tag = b64ToBuf(P.authTag);
  var combined = new Uint8Array(ct.length + tag.length);
  combined.set(ct); combined.set(tag, ct.length);
  return crypto.subtle.decrypt({name: 'AES-GCM', iv: b64ToBuf(P.iv)}, key, combined);
}
var gate = document.getElementById('pwGate');
var card = document.getElementById('pwCard');
var inp = document.getElementById('pwInput');
var btn = document.getElementById('pwBtn');
var err = document.getElementById('pwError');
var toggle = document.getElementById('pwToggle');
var load = document.getElementById('pwLoading');
var ct = document.getElementById('reportContainer');
function shake() { card.classList.remove('pw-shake'); void card.offsetWidth; card.classList.add('pw-shake'); }
function showErr(msg) { err.textContent = msg || '密码错误，请重试'; err.classList.add('show'); shake(); }
function hideErr() { err.classList.remove('show'); }
function checkCached() {
  try { var c = sessionStorage.getItem('_cases_decrypted'); if (c) { ct.innerHTML = c; document.body.classList.remove('pw-active'); gate.classList.add('hidden'); return true; } } catch(e) {}
  return false;
}
async function tryDecrypt(pwd) {
  hideErr(); btn.disabled = true; load.classList.add('active'); btn.textContent = '解密中...';
  try {
    var buf = await decrypt(pwd.trim());
    var dec = new TextDecoder();
    var html = dec.decode(buf);
    try { sessionStorage.setItem('_cases_decrypted', html); } catch(e) {}
    ct.innerHTML = html;
    document.body.classList.remove('pw-active');
    gate.classList.add('hidden');
    inp.value = '';
    try { localStorage.setItem('_cases_auth', '1'); } catch(e) {}
  } catch(e) {
    load.classList.remove('active'); btn.textContent = '解密查看'; btn.disabled = false;
    showErr(e.name === 'OperationError' ? '密码错误，请重试' : '解密失败，请刷新重试');
    inp.value = ''; inp.focus(); return;
  }
  load.classList.remove('active'); btn.textContent = '解密查看'; btn.disabled = false;
}
var vis = false;
toggle.addEventListener('click', function(){ vis = !vis; inp.type = vis ? 'text' : 'password'; toggle.title = vis ? '隐藏密码' : '显示密码'; });
btn.addEventListener('click', function(){ tryDecrypt(inp.value); });
inp.addEventListener('keydown', function(e){ if (e.key === 'Enter') tryDecrypt(inp.value); hideErr(); });
function checkReturn() {
  try { if (localStorage.getItem('_cases_auth') === '1') { if (checkCached()) return; } } catch(e) {}
}
checkReturn();
setTimeout(function(){ inp.focus(); }, 400);
})();
</script>
